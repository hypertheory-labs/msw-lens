# MSW Scenario Manifest
# This file is the source of truth for what scenarios exist for this endpoint.
# It is read by msw-lens to populate the scenario switcher.
# It can also be dropped into an LLM conversation as context.

endpoint: https://store.company.com/products
method: GET
shape: collection
description: Full product catalog — loaded on entry to populate the entity store and the "N products in our store" count

responseType:
  name: ProductApiItem[]
  path: src/app/areas/shopping-cart/shopping-cart-landing/data/product-store.ts

context:
  sourceHints:
    - src/app/areas/shopping-cart/shopping-cart-landing/data/product-store.ts
    - src/app/areas/shopping-cart/shopping-cart-landing/internal/pages/add-product.ts

scenarios:
  typical:
    description: Catalog has several products — the happy path; verifies the "N products in our store" count renders the correct number above the add form
    active: true

  empty:
    description: Catalog has no products — tests that the count reads "0 products" and the add form still renders and submits correctly without a prefilled list in the store

  single-item:
    description: Exactly one product in the catalog — edge of the list; confirms count shows "1" and verifies singular/plural rendering if the template ever adds it

  slow:
    description: Catalog service is sluggish — tests whether the product count shows a placeholder or stays at "0" during the load (currently no loading state; count will read 0 until _load() resolves)
    delay: real

  unauthorized:
    description: Session has expired before the page loaded — tests whether an auth guard redirects to login or the form appears with the count stuck at 0
    httpStatus: 401

  server-error:
    description: Catalog service is unavailable — tests whether the count stays at 0 or an error message surfaces (_load() currently has no error handling and will swallow the failure silently)
    httpStatus: 500
